<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Foto - Pinky Space</title>
    <style>
        /* CSS INTERNAL */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fff0f5; /* Lavender Blush */
            color: #4a4a4a;
        }

        header {
            background-color: #ffb6c1; /* Light Pink */
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0;
            color: #ffffff;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        }

        nav {
            display: flex;
            justify-content: center;
            background-color: #ffc0cb;
            padding: 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            text-decoration: none;
            color: #6d4c41;
            font-weight: bold;
            margin: 0 15px;
            transition: 0.3s;
            font-size: 0.9em;
        }

        nav a:hover {
            color: #ffffff;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .gallery-title {
            text-align: center;
            color: #db7093;
            margin-bottom: 30px;
        }

        /* Grid System untuk Galeri */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 10px;
        }

        .gallery-item {
            overflow: hidden;
            border-radius: 15px;
            border: 5px solid #ffe4e1;
            transition: transform 0.3s ease, border-color 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover; /* Agar gambar tidak gepeng */
            display: block;
            transition: filter 0.3s ease;
        }

        /* Efek Hover */
        .gallery-item:hover {
            transform: scale(1.03);
            border-color: #ffb6c1;
        }

        .gallery-item:hover img {
            filter: brightness(90%);
        }

        .caption {
            padding: 10px;
            text-align: center;
            font-size: 0.9em;
            color: #db7093;
            font-weight: 500;
        }

        footer {
            text-align: center;
            padding: 30px;
            color: #db7093;
            font-size: 0.8em;
        }

        /* Responsif untuk layar kecil */
        @media (max-width: 600px) {
            .gallery-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Album Kenangan</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="biodata.html">Biodata</a>
        <a href="galeri-foto.html">Foto</a>
        <a href="galeri-video.html">Video</a>
    </nav>

    <div class="container">
        <h2 class="gallery-title">Koleksi Foto</h2>
        
        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="IMG_1064.jpeg" alt="Foto 1">
                <div class="caption">Bagian Kiri</div>
            </div>

            <div class="gallery-item">
                <img src="IMG_1068.jpeg" alt="Foto 2">
                <div class="caption">Bagian Belakang</div>
            </div>

            <div class="gallery-item">
                <img src="https://via.placeholder.com/400x300/ff69b4/ffffff?text=Teman+1" alt="Foto Bersama Teman">
                <div class="caption">Momen Bersama</div>
            </div>

            <div class="gallery-item">
                <img src="https://via.placeholder.com/400x300/db7093/ffffff?text=Senja+1" alt="Foto Senja">
                <div class="caption">Menikmati Senja</div>
            </div>

            <div class="gallery-item">
                <img src="https://via.placeholder.com/400x300/ffc0cb/ffffff?text=Kuliner+1" alt="Foto Makanan">
                <div class="caption">Kuliner Favorit</div>
            </div>

            <div class="gallery-item">
                <img src="https://via.placeholder.com/400x300/ffb6c1/ffffff?text=Event+1" alt="Foto Acara">
                <div class="caption">Acara Spesial</div>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2024 Design with ❤️ by [Nama Anda]
    </footer>

</body>
</html>
