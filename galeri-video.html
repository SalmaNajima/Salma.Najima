<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Video - Pinky Space</title>
    <style>
        /* CSS INTERNAL */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fff0f5; /* Lavender Blush */
            color: #4a4a4a;
        }

        header {
            background-color: #ffb6c1; /* Light Pink */
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0;
            color: #ffffff;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        }

        nav {
            display: flex;
            justify-content: center;
            background-color: #ffc0cb;
            padding: 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            text-decoration: none;
            color: #6d4c41;
            font-weight: bold;
            margin: 0 15px;
            transition: 0.3s;
            font-size: 0.9em;
            text-transform: uppercase;
        }

        nav a:hover {
            color: #ffffff;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 30px;
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .video-title {
            text-align: center;
            color: #db7093;
            margin-bottom: 40px;
        }

        /* Grid Video */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .video-item {
            background-color: #fffafa;
            border-radius: 15px;
            overflow: hidden;
            border: 4px solid #ffe4e1;
            transition: border-color 0.3s;
        }

        .video-item:hover {
            border-color: #ffb6c1;
        }

        video {
            width: 100%;
            display: block;
            background-color: #000;
        }

        .video-info {
            padding: 15px;
            text-align: center;
        }

        .video-info h3 {
            margin: 0;
            font-size: 1.1em;
            color: #db7093;
        }

        .video-info p {
            margin: 5px 0 0;
            font-size: 0.85em;
            color: #888;
        }

        footer {
            text-align: center;
            padding: 40px;
            color: #db7093;
            font-size: 0.8em;
        }

        /* Responsif */
        @media (max-width: 650px) {
            .video-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Koleksi Video</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="biodata.html">Biodata</a>
        <a href="galeri-foto.html">Foto</a>
        <a href="galeri-video.html">Video</a>
    </nav>

    <div class="container">
        <h2 class="video-title">Tonton Momen Seru</h2>

            <div class="video-item">
                <video controls>
                    <source src="VIDEO-2026-04-07-19-15-28.mp4" type="video/mp4">
                    Browser Anda tidak mendukung tag video.
                </video>
                <div class="video-info">
                    <h3>Video Kos</h3>
                    <p>Presentasi Project Website</p>
                </div>
            </div>

            </div>
    </div>

    <footer>
        &copy; 2026 Design with ❤️ by [Salma Najima]
    </footer>

</body>
</html>
